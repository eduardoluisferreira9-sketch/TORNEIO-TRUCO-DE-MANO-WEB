<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telão - Torneio de Truco Cego</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- Identidade Visual Alinhada --- */
        :root {
            --bg-feltro: radial-gradient(circle, #0e3118 0%, #05160a 100%); 
            --bg-card: rgba(4, 15, 7, 0.65); 
            --borda-ouro: #d4af37;   
            --dourado-brilhante: #f3cf5d;
            --texto-claro: #ffffff;
            --texto-mutado: #a8c3af; 
            --sucesso: #2ecc71;
            --danger: #ff4757;
            --madeira: #8d6e63; 
            --plata-prata: #bdc3c7;
            --madeira-bronze: #cd7f32;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            box-sizing: border-box;
        }

        body {
            background: var(--bg-feltro);
            background-attachment: fixed;
            color: var(--texto-claro);
            font-family: 'Montserrat', sans-serif;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, .podio-titulo, .mesa-tag {
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
        }

        .painel-admin-secreto {
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: inline-flex;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            align-self: flex-start;
            flex-shrink: 0;
        }
        .btn-admin {
            background: #071a0c;
            color: var(--borda-ouro);
            border: 1px solid var(--borda-ouro);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-admin:hover {
            background: var(--borda-ouro);
            color: #000;
        }
        .btn-admin.btn-reset {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(255, 71, 87, 0.05);
        }
        .btn-admin.btn-reset:hover {
            background: var(--danger);
            color: #fff;
        }

        .alerta-falta-banner {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 15, 8, 0.96);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 1px solid var(--danger);
            box-sizing: border-box;
            animation: pulseBorda 1.5s infinite alternate;
        }

        /* --- Header Otimizado para Título e Cronômetro Gigantes --- */
        .header-telao {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--borda-ouro);
            padding-bottom: 15px; 
            margin-bottom: 10px;
            flex-shrink: 0;
            gap: 20px;
        }
        .header-telao h1 {
            margin: 0;
            font-size: 2.5rem; /* DESTAQUE MÁXIMO DO TORNEIO */
            font-weight: 900;
            color: var(--dourado-brilhante);
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.6), 0 0 10px rgba(243, 207, 93, 0.2); 
            line-height: 1;
            white-space: nowrap;
        }
        .header-telao h1 span { 
            color: #ffffff; 
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.6);
        }
        
        .cronometro-container {
            border: 2px solid var(--borda-ouro);
            padding: 6px 30px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            min-width: 200px;
            max-width: 100%;
            transition: all 0.3s ease;
        }
        .cronometro-digital {
            font-size: clamp(2rem, 5vw, 5.5rem); /* Otimização Responsiva */
            font-family: 'Courier New', Courier, monospace;
            font-weight: 900;
            color: var(--dourado-brilhante);
            line-height: 0.9;
            letter-spacing: -1px;
            white-space: nowrap;
            text-align: center;
        }

        /* Estado Crítico: Tempo Esgotado / Falta */
        .cronometro-digital.alerta-ativo {
            color: #ff3838 !important;
            text-shadow: 0 0 15px rgba(255, 56, 56, 0.6);
            animation: pulsarCronometro 1s ease-in-out infinite alternate;
        }

        .painel-infos {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border: 1px solid var(--borda-ouro);
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.2);
            margin-bottom: 15px;
            flex-shrink: 0;
        }
        .info-item {
            padding: 8px 15px;
            position: relative;
        }
        .info-item:not(:last-child)::after {
            content: "";
            position: absolute;
            right: 0;
            top: 15%;
            height: 70%;
            width: 1px;
            background: rgba(212, 175, 55, 0.25);
        }
        .info-rotulo {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--texto-mutado);
            margin-bottom: 2px;
            font-weight: 600;
        }
        .info-valor {
            font-size: 1.05rem;
            font-weight: bold;
            color: var(--dourado-brilhante);
        }

        .secao-titulo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .secao-titulo {
            font-size: 1.05rem;
            color: var(--dourado-brilhante);
            font-weight: bold;
            text-transform: uppercase;
            margin: 0;
            white-space: nowrap;
        }
        .secao-linha {
            flex-grow: 1;
            height: 1px;
            background: var(--borda-ouro);
        }

        /* --- Container Principal Adaptável --- */
        .container-telao {
            display: grid;
            grid-template-columns: 2.5fr 1fr; 
            gap: 20px;
            flex-grow: 1; 
            min-height: 0; 
        }

        .container-telao.modo-mata-mata {
            grid-template-columns: 1fr !important; 
        }

        .coluna-mesas {
            display: flex;
            flex-direction: column;
            min-height: 0; 
            height: 100%;
        }

        .grid-jogos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); 
            gap: 10px;
            align-content: flex-start;
            flex-grow: 1;
            min-height: 0;
            overflow: hidden; 
        }

        /* --- Mudança Dinâmica para o Combate Final --- */
        .grid-jogos.layout-super-finais {
            grid-template-columns: repeat(2, 1fr) !important; 
            gap: 20px !important;
            align-content: stretch !important; 
            height: 85% !important;
        }

        .card-jogo {
            background: var(--bg-card);
            border: 1px solid var(--borda-ouro);
            border-radius: 4px;
            padding: 8px 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 0;
            transition: all 0.3s ease;
        }

        .grid-jogos.layout-super-finais .card-jogo {
            padding: 25px 20px !important;
            justify-content: space-around !important; 
            background: linear-gradient(145deg, rgba(4, 25, 12, 0.85) 0%, rgba(2, 10, 5, 0.95) 100%);
            border-width: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .mesa-tag {
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 4px;
            color: var(--dourado-brilhante);
        }
        .confronto-flex {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .grid-jogos.layout-super-finais .confronto-flex {
            gap: 15px !important; 
        }

        .atleta-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 10px; 
            border-radius: 4px;
        }
        
        .grid-jogos.layout-super-finais .atleta-box {
            padding: 22px 25px !important;
            border-radius: 6px;
        }

        .atleta-box.lider-mesa {
            border-left: 3px solid var(--sucesso);
            background: rgba(46, 204, 113, 0.02);
        }
        
        .atleta-box.vencedor-card {
            background-color: rgba(4, 35, 15, 0.85) !important;
            border-left: 6px solid #2ecc71 !important;
        }
        .atleta-box.vencedor-card .atleta-linha {
            color: #2ecc71 !important;
            font-weight: bold;
        }
        .atleta-box.perdedor-card {
            background-color: rgba(35, 10, 10, 0.6) !important;
            border-left: 6px solid #e74c3c !important;
            opacity: 0.5;
        }
        .atleta-box.perdedor-card .atleta-linha {
            color: #e74c3c !important;
        }
        .vs-espacador-oculto {
            height: 2px;
        }

        .atleta-linha { 
            font-weight: 600; 
            font-size: 0.9rem; 
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; 
            max-width: 65%;
        }
        .placar-tag { 
            font-family: monospace; 
            font-weight: bold; 
            font-size: 0.8rem;
            color: var(--borda-ouro); 
            background: #000;
            padding: 2px 6px;
            border-radius: 2px;
            white-space: nowrap;
        }

        .grid-jogos.layout-super-finais .placar-tag {
            font-size: 1.4rem !important;
            padding: 6px 14px !important;
            border: 1px solid rgba(214, 175, 55, 0.3);
        }

        .vs-tag { 
            text-align: center; 
            font-size: 0.7rem; 
            color: var(--texto-mutado); 
            font-weight: bold; 
            margin: 0;
        }
        
        .grid-jogos.layout-super-finais .vs-tag {
            font-size: 1.1rem !important;
            color: var(--borda-ouro);
            opacity: 0.5;
        }

        /* --- Painel Lateral do Ranking --- */
        .ranking-container {
            border: 1px solid var(--borda-ouro);
            background: rgba(4, 15, 7, 0.4);
            border-radius: 5px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            min-height: 0;
            height: 100%;
            box-sizing: border-box;
        }
        
        .ranking-scroller-box {
            flex-grow: 1;
            overflow: hidden;
            position: relative;
            margin-top: 5px;
        }

        .tabela-ranking {
            width: 100%;
            border-collapse: collapse;
        }
        .tabela-ranking th { 
            color: var(--texto-mutado); 
            text-transform: uppercase; 
            font-size: 0.65rem; 
            font-weight: 700;
            border-bottom: 1px solid var(--borda-ouro);
            padding: 8px 6px;
            position: sticky;
            top: 0;
            background: #06190c; 
            z-index: 2;
        }
        
        .ranking-marquise-body {
            display: table-row-group;
            position: relative;
            top: 0;
        }

        .tabela-ranking td {
            border-bottom: 1px solid rgba(214, 175, 55, 0.1);
            font-size: 0.85rem;
            padding: 8px 6px;
        }
        .posicao-num { 
            width: 35px; 
            font-weight: bold; 
            color: var(--borda-ouro); 
            font-size: 0.95rem;
        }
        .badge-vitorias { 
            background: #000; 
            color: var(--texto-claro);
            padding: 3px 8px; 
            border-radius: 4px; 
            font-size: 0.75rem; 
            font-weight: bold;
            border: 1px solid rgba(214, 175, 55, 0.1); 
        }

        tr.top-atleta td.posicao-num {
            color: var(--dourado-brilhante);
            text-shadow: 0 0 5px rgba(243, 207, 93, 0.3);
        }

        .badge-final-ouro { background: var(--borda-ouro); color: #000; padding: 5px 12px; border-radius: 3px; font-weight: 900; font-size: 1.1rem; }
        .badge-final-bronze { background: var(--madeira-bronze); color: #fff; padding: 5px 12px; border-radius: 3px; font-weight: 900; font-size: 1.1rem; }

        /* --- Pódio Premium --- */
        .podio-wrapper {
            background: linear-gradient(180deg, rgba(7, 26, 12, 0.95) 0%, #030a04 100%);
            padding: 25px;
            border-radius: 4px;
            border: 2px solid var(--borda-ouro);
            height: 100%;
            box-sizing: border-box;
            overflow-y: auto; 
        }
        .podio-titulo { text-align: center; font-size: 2.2rem; font-weight: 900; color: var(--borda-ouro); margin-bottom: 5px; }
        .podio-flex { display: flex; justify-content: center; align-items: flex-end; gap: 15px; margin-top: 20px; }
        .podio-card { background: rgba(0,0,0,0.4); border-radius: 4px; padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; }
        .podio-card.ouro { border: 3px solid var(--borda-ouro); height: 240px; width: 240px; order: 2; }
        .podio-card.prata { border: 2px solid var(--plata-prata); height: 200px; width: 210px; order: 1; }
        .podio-card.bronze { border: 2px solid var(--madeira-bronze); height: 180px; width: 210px; order: 3; }
        .podio-medalha { font-size: 2.2rem; margin-bottom: 5px; }
        .podio-rotulo-lugar { font-size: 0.75rem; text-transform: uppercase; font-weight: bold; color: var(--texto-mutado); }
        .podio-nome { font-size: 1.1rem; font-weight: bold; margin-top: 10px; color: #fff; }

        /* --- Animações --- */
        @keyframes pulseBorda {
            from { border-color: var(--danger); box-shadow: inset 0 0 50px rgba(255, 71, 87, 0.4); }
            to { border-color: #ff6b81; box-shadow: inset 0 0 20px rgba(255, 71, 87, 0.2); }
        }

        @keyframes pulsarCronometro {
            from { transform: scale(1); opacity: 1; }
            to { transform: scale(1.03); opacity: 0.85; }
        }

        @keyframes autoScrollRanking {
            0%, 10% { transform: translateY(0); }
            45%, 55% { transform: translateY(var(--scroll-distancia, -50%)); }
            90%, 100% { transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="painel-admin-secreto">
        <button class="btn-admin" onclick="forcarPodioManual()">🏆 Exibir Premiação</button>
        <button class="btn-admin btn-reset" onclick="liberarTelaoManual()">🔄 Voltar para Mesas</button>
    </div>

    <div id="alerta-falta" class="alerta-falta-banner">
        <div class="alerta-falta-conteudo">
            <h2>⚠️ TEMPO ESGOTADO!</h2>
            <h2>AGORA TUDO É <span>FAIXA / FALTA!</span></h2>
            <p style="font-size: 1.5rem;">Fechem as vazas e concluam a jogada imediatamente.</p>
        </div>
    </div>

    <div class="header-telao">
        <h1 id="nome-torneio">TORNEIO DE TRUCO <span>CEGO</span></h1>
        <div class="cronometro-container">
            <div id="cronometro" class="cronometro-digital">00:00</div>
        </div>
    </div>

    <div class="painel-infos">
        <div class="info-item">
            <div class="info-rotulo">Fase Atual</div>
            <div id="info-fase" class="info-valor">---</div>
        </div>
        <div class="info-item">
            <div class="info-rotulo">Andamento</div>
            <div id="info-detalhe-fase" class="info-valor">---</div>
        </div>
        <div class="info-item">
            <div class="info-max-rodadas" style="display:none;"></div> 
            <div class="info-rotulo">Mesas Decisivas</div>
            <div id="info-mesas-ativas-rotulo" class="info-valor">0 Mesas</div>
        </div>
        <div class="info-item">
            <div class="info-rotulo">Inscritos Confirmados</div>
            <div id="info-total-atletas" class="info-valor">-- Atletas</div>
        </div>
    </div>

    <div id="conteudo-principal-telao" class="container-telao">
        <div class="coluna-mesas">
            <div class="secao-titulo-container">
                <h2 class="secao-titulo" id="titulo-secao-jogos">Mesas em Andamento</h2>
                <div class="secao-linha"></div>
            </div>
            <div id="container-jogos" class="grid-jogos"></div>
        </div>

        <div class="ranking-container" id="coluna-ranking-lateral">
            <div class="secao-titulo-container">
                <h2 class="secao-titulo">Classificação Geral</h2>
                <div class="secao-linha"></div>
            </div>
            <div class="ranking-scroller-box" id="ranking-box-container">
                <table class="tabela-ranking">
                    <thead>
                        <tr>
                            <th style="text-align: left;">Pos</th>
                            <th style="text-align: left;">Atleta</th>
                            <th style="text-align: right;">Vitórias</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-ranking-corpo" class="ranking-marquise-body"></tbody>
                </table>
            </div>
        </div>
    </div>

<script>
    let podioForcadoManualmente = localStorage.getItem('telao_modo_podio') === 'true';
    let ultimoEstadoJogosStr = "";
    let ultimoEstadoRankingStr = "";

    function forcarPodioManual() {
        podioForcadoManualmente = true;
        localStorage.setItem('telao_modo_podio', 'true');
        atualizarTelao();
    }

    function liberarTelaoManual() {
        podioForcadoManualmente = false;
        localStorage.setItem('telao_modo_podio', 'false');
        window.location.reload();
    }

    function ajustarTamanhoDosCards(totalMesas, ehMataMata) {
        const grid = document.getElementById('container-jogos');
        if (!grid) return;

        const atletaLinhas = grid.querySelectorAll('.atleta-linha');
        const atletaBoxes = grid.querySelectorAll('.atleta-box');
        const tagsMesa = grid.querySelectorAll('.mesa-tag');

        if (ehMataMata && totalMesas <= 2) {
            grid.classList.add('layout-super-finais');
            atletaLinhas.forEach(el => {
                el.style.fontSize = "1.9rem";
                el.style.fontWeight = "800";
                el.style.maxWidth = "70%";
            });
            tagsMesa.forEach(tag => tag.style.fontSize = "1.4rem");
            return; 
        }

        grid.classList.remove('layout-super-finais');
        grid.style.gap = "10px";

        let fontSizeCard = "0.9rem";
        let paddingBox = "6px 10px";
        let minWidthGrid = "290px";

        if (ehMataMata) {
            fontSizeCard = "1.25rem";
            paddingBox = "14px 18px";
            minWidthGrid = "450px"; 
            tagsMesa.forEach(tag => tag.style.fontSize = "1.1rem");
            grid.style.gap = "18px";
        } else {
            if (totalMesas > 12) {
                fontSizeCard = "0.75rem";
                paddingBox = "4px 8px";
                minWidthGrid = "220px";
            } else if (totalMesas > 8) {
                fontSizeCard = "0.82rem";
                paddingBox = "5px 10px";
                minWidthGrid = "250px";
            }
        }

        grid.style.gridTemplateColumns = `repeat(auto-fill, minmax(${minWidthGrid}, 1fr))`;
        atletaLinhas.forEach(el => el.style.fontSize = fontSizeCard);
        atletaBoxes.forEach(el => el.style.padding = paddingBox);
    }

    function gerenciarScrollDoRanking() {
        const container = document.getElementById('ranking-box-container');
        const body = document.getElementById('tabela-ranking-corpo');
        if (!container || !body) return;

        const alturaDisponivel = container.clientHeight;
        const alturaTabela = body.scrollHeight;

        if (alturaTabela > alturaDisponivel) {
            const distanciaScroll = alturaTabela - alturaDisponivel + 20; 
            body.style.setProperty('--scroll-distancia', `-${distanciaScroll}px`);
            body.style.animation = "autoScrollRanking 20s linear infinite alternate";
        } else {
            body.style.animation = "none";
            body.style.transform = "translateY(0)";
        }
    }

    async function atualizarTelao() {
        try {
            const response = await fetch(`/api/publico/dados?t=${new Date().getTime()}`);
            if (!response.ok) return;
            const data = await response.json();
            if (!data) return;

            const statusFase = data.fase_torneio ? data.fase_torneio.toUpperCase() : "";
            const nomeFaseStr = data.nome_fase ? data.nome_fase.toUpperCase() : "";
            const faseRaw = Number(data.fase_atual);
            
            const ehMataMataAtivo = (faseRaw === -1 || faseRaw === -4 || nomeFaseStr.includes("MATA") || nomeFaseStr.includes("ELIMINATOR") || nomeFaseStr.includes("FINAL") || statusFase === "MATA_MATA");

            const exibirCerimonial = podioForcadoManualmente || 
                                     statusFase === "ENCERRADO" || 
                                     statusFase === "CONCLUIDO" || 
                                     statusFase === "FINALIZADO" ||
                                     nomeFaseStr.includes("ENCERRADO") || 
                                     nomeFaseStr.includes("CONCLUÍDO") ||
                                     faseRaw === -12;

            const telaPrincipal = document.getElementById('conteudo-principal-telao');

            if (exibirCerimonial) {
                ultimoEstadoJogosStr = "";
                ultimoEstadoRankingStr = "";

                if (telaPrincipal) telaPrincipal.style.gridTemplateColumns = "1fr"; 

                let p1 = "---", p2 = "---", p3 = "---", p4 = "---";
                let reiDasFloresNome = "---";
                let qtdFloresTotal = 0;

                if (data.confrontos && data.confrontos.length > 0) {
                    const jogoFinal = data.confrontos.find(j => Number(j.fase_mesa) === -2 || Number(j.mesa) === 1);
                    if (jogoFinal) {
                        const t1 = Number(jogoFinal.tentos1 || 0);
                        const t2 = Number(jogoFinal.tentos2 || 0);
                        const vId = jogoFinal.vencedor_id;
                        const idA1 = jogoFinal.atleta1_id || jogoFinal.athlete1_id;

                        if (vId || t1 > 0 || t2 > 0) {
                            if (vId == idA1 || t1 > t2) {
                                p1 = jogoFinal.atleta1_nome || "---";
                                p2 = jogoFinal.atleta2_nome || "---";
                            } else {
                                p1 = jogoFinal.atleta2_nome || "---";
                                p2 = jogoFinal.atleta1_nome || "---";
                            }
                        } else {
                            p1 = `${jogoFinal.atleta1_nome} (Finalista)`;
                            p2 = `${jogoFinal.atleta2_nome} (Finalista)`;
                        }
                    }

                    const jogoBronze = data.confrontos.find(j => Number(j.fase_mesa) === -3 || Number(j.mesa) === 2);
                    if (jogoBronze) {
                        const t1 = Number(jogoBronze.tentos1 || 0);
                        const t2 = Number(jogoBronze.tentos2 || 0);
                        const vId = jogoBronze.vencedor_id;
                        const idA1 = jogoBronze.atleta1_id || jogoBronze.athlete1_id;

                        if (vId || t1 > 0 || t2 > 0) {
                            if (vId == idA1 || t1 > t2) {
                                p3 = jogoBronze.atleta1_nome || "---";
                                p4 = jogoBronze.atleta2_nome || "---";
                            } else {
                                p3 = jogoBronze.atleta2_nome || "---";
                                p4 = jogoBronze.atleta1_nome || "---";
                            }
                        } else {
                            p3 = `${jogoBronze.atleta1_nome} (Disputa)`;
                            p4 = `${jogoBronze.atleta2_nome} (Disputa)`;
                        }
                    }
                } 
                
                if (data.podio) {
                    reiDasFloresNome = data.podio.rei_nome || data.podio.rei_flores || "---";
                    qtdFloresTotal = data.podio.max_flores || data.podio.flores || 0;
                    if (p1 === "---") p1 = data.podio.campeao || data.podio.p1 || "---";
                    if (p2 === "---") p2 = data.podio.vice || data.podio.p2 || "---";
                    if (p3 === "---") p3 = data.podio.terceiro || data.podio.p3 || "---";
                    if (p4 === "---") p4 = data.podio.quarto || data.podio.p4 || "---";
                }

                if (p1 !== "---" && p1 !== "") {
                    localStorage.setItem('cache_nomes_podio', JSON.stringify({p1, p2, p3, p4, reiDasFloresNome, qtdFloresTotal}));
                } else {
                    const cache = JSON.parse(localStorage.getItem('cache_nomes_podio') || '{}');
                    if (cache.p1) {
                        p1 = cache.p1; p2 = cache.p2; p3 = cache.p3; p4 = cache.p4;
                        reiDasFloresNome = cache.reiDasFloresNome || "---";
                        qtdFloresTotal = cache.qtdFloresTotal || 0;
                    }
                }

                if (telaPrincipal) {
                    telaPrincipal.innerHTML = `
                        <div class="podio-wrapper">
                            <div class="podio-titulo">👑 CERIMÔNIA DE PREMIAÇÃO 👑</div>
                            <div style="text-align:center; color:var(--texto-mutado); margin-bottom:15px; font-style:italic; font-size:1rem;">O pódio de honra da arena está consolidado!</div>
                            
                            <div class="podio-flex">
                                <div class="podio-card prata">
                                    <div>
                                        <div class="podio-medalha">🥈</div>
                                        <div class="podio-rotulo-lugar">Vice-Campeão</div>
                                    </div>
                                    <div class="podio-nome">${p2}</div>
                                </div>

                                <div class="podio-card ouro">
                                    <div>
                                        <div class="podio-medalha">👑</div>
                                        <div class="podio-rotulo-lugar" style="color:var(--dourado-brilhante)">GRANDE CAMPEÃO</div>
                                    </div>
                                    <div class="podio-nome" style="font-size: 1.3rem; color: var(--dourado-brilhante); font-family:'Cinzel', serif;">${p1}</div>
                                </div>

                                <div class="podio-card bronze">
                                    <div>
                                        <div class="podio-medalha">🥉</div>
                                        <div class="podio-rotulo-lugar">3º Colocado</div>
                                    </div>
                                    <div class="podio-nome">${p3}</div>
                                </div>

                                <div class="podio-card" style="border: 2px solid var(--madeira); height: 160px; width: 200px; display: flex; flex-direction: column; justify-content: space-between;">
                                    <div>
                                        <div class="podio-medalha" style="font-size: 1.8rem;">🏅</div>
                                        <div class="podio-rotulo-lugar" style="color: var(--madeira);">4º Colocado</div>
                                    </div>
                                    <div class="podio-nome" style="color: #bbb; font-size: 0.95rem;">${p4}</div>
                                </div>
                            </div>

                            <div class="painel-rei-flores" style="border: 2px dashed var(--borda-ouro); background: linear-gradient(130deg, rgba(214,175,55,0.08), rgba(0,0,0,0)); padding: 15px; border-radius: 4px; text-align: center; max-width: 550px; margin: 30px auto 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
                                <div style="color: var(--borda-ouro); font-family: 'Cinzel', serif; font-size: 1.2rem; font-weight: bold; margin-bottom: 4px; letter-spacing: 1px;">🌸 TROFÉU REI DAS FLORES 🌸</div>
                                <div style="color: var(--texto-mutado); font-size: 0.85rem; margin-bottom: 8px;">O maior cantador de flores da rodada:</div>
                                <div style="color: #ffffff; font-size: 1.5rem; font-weight: 800; letter-spacing: 1px; margin-bottom: 8px;">${reiDasFloresNome.toUpperCase()}</div>
                                <div style="display: inline-block; background: var(--borda-ouro); color: #000; padding: 4px 15px; border-radius: 2px; font-size: 0.8rem; font-weight: bold;">
                                    🎯 ${qtdFloresTotal} Flores Cantadas no Torneio
                                </div>
                            </div>
                        </div>
                    `;
                }
                
                document.getElementById('info-fase').innerText = "🏁 ENCERRADO";
                document.getElementById('info-detalhe-fase').innerText = "Torneio Concluído";
                document.getElementById('cronometro').innerText = "--:--";
                document.getElementById('cronometro').classList.remove('alerta-ativo');
                return;
            }

            const rankingLateral = document.getElementById('coluna-ranking-lateral');
            const tituloJogos = document.getElementById('titulo-secao-jogos');

            if (telaPrincipal) {
                if (ehMataMataAtivo) {
                    telaPrincipal.classList.add('modo-mata-mata');
                    if (rankingLateral) rankingLateral.style.display = 'none';
                    if (tituloJogos) tituloJogos.innerText = "Confrontos Eliminatórios";
                } else {
                    telaPrincipal.classList.remove('modo-mata-mata');
                    if (rankingLateral) rankingLateral.style.display = 'flex';
                    if (tituloJogos) tituloJogos.innerText = "Mesas em Andamento";
                }
            }

            if (document.getElementById('info-fase')) {
                let nomeExibicaoFase = data.nome_fase || data.fase_atual || data.fase || "Fase Classificatória";
                if (faseRaw === -1) nomeExibicaoFase = "Mata-Mata Final";
                if (faseRaw === -4) nomeExibicaoFase = "Semifinal";
                document.getElementById('info-fase').innerText = nomeExibicaoFase.toUpperCase();
            }

            if (document.getElementById('info-detalhe-fase')) {
                let andamentoTexto = data.detalhe_fase || data.andamento || data.status_rodada;
                const faseTexto = document.getElementById('info-fase').innerText.toUpperCase();
                if (andamentoTexto && andamentoTexto.toUpperCase() === faseTexto || (andamentoTexto && andamentoTexto.replace(/\D/g,'') === faseTexto.replace(/\D/g,''))) {
                    andamentoTexto = ehMataMataAtivo ? "Jogos Decisivos" : "Em Andamento"; 
                }
                document.getElementById('info-detalhe-fase').innerText = andamentoTexto || "Em andamento";
            }

            const elMax = document.getElementById('info-mesas-ativas-rotulo');
            let totalConfrontosAtuais = 0;
            if (elMax) {
                totalConfrontosAtuais = data.confrontos ? data.confrontos.length : 0;
                elMax.innerText = `${totalConfrontosAtuais} Mesas`;
            }

            const elAtletas = document.getElementById('info-total-atletas');
            if (elAtletas) {
                let qtdAtletas = data.total_atletas || data.inscritos || data.total_jogadores || 0;
                if (Number(qtdAtletas) === 0 && data.ranking) qtdAtletas = data.ranking.length;
                elAtletas.innerText = `${qtdAtletas} Atletas`;
            }
            
            const tempoFormatado = data.tempo || "00:00";
            const cronoAtivo = data.crono_ativo === 1;
            const cronoElement = document.getElementById('cronometro');
            const alertaElement = document.getElementById('alerta-falta');
            
            if (!cronoAtivo) {
                cronoElement.innerText = tempoFormatado;
                cronoElement.style.color = '#555555';
                cronoElement.parentElement.style.borderColor = '#444444';
                cronoElement.classList.remove('alerta-ativo');
                alertaElement.style.display = 'none';
            } else {
                cronoElement.parentElement.style.borderColor = 'var(--borda-ouro)';
                if (tempoFormatado === "AGORA TUDO É FALTA!" || tempoFormatado === "00:00") {
                    cronoElement.innerText = "00:00";
                    cronoElement.classList.add('alerta-ativo');
                    alertaElement.style.display = 'flex';
                } else {
                    cronoElement.innerText = tempoFormatado;
                    cronoElement.style.color = 'var(--dourado-brilhante)';
                    cronoElement.classList.remove('alerta-ativo');
                    alertaElement.style.display = 'none';
                }
            }

            // --- RENDERIZAÇÃO DOS CONFRONTOS ---
            const containerJogos = document.getElementById('container-jogos');
            if (containerJogos) {
                const signatureAtualJogos = JSON.stringify(data.confrontos || []);
                
                if (signatureAtualJogos !== ultimoEstadoJogosStr) {
                    ultimoEstadoJogosStr = signatureAtualJogos; 
                    containerJogos.innerHTML = '';
                    
                    if (!data.confrontos || data.confrontos.length === 0) {
                        containerJogos.innerHTML = `<div style="color: var(--texto-mutado); font-style: italic; padding: 10px;">Nenhum confronto ativo. Aguardando chaves...</div>`;
                    } else {
                        data.confrontos.forEach(jogo => {
                            const card = document.createElement('div');
                            card.className = 'card-jogo';
                            const advNome = jogo.atleta2_nome ? jogo.atleta2_nome : "FOLGA / W.O.";
                            
                            const f1 = jogo.sets1 !== null ? jogo.sets1 : (jogo.flores1 || 0);
                            const t1 = jogo.tentos1 || 0;
                            const fa1 = jogo.faltas1 || 0;

                            const f2 = jogo.sets2 !== null ? jogo.sets2 : (jogo.flores2 || 0);
                            const t2 = jogo.tentos2 || 0;
                            const fa2 = jogo.faltas2 || 0;

                            const p1Str = `${f1}S | ${t1}T | ${fa1}F`;
                            const p2Str = `${f2}S | ${t2}T | ${fa2}F`;
                            
                            const statusMesa = jogo.status ? jogo.status.toUpperCase() : 'ANDAMENTO';
                            const partidaConcluida = (statusMesa === 'FINALIZADO' || statusMesa === 'CONCLUIDO' || jogo.encerrado === true || jogo.vencedor_id !== null);

                            let classeJ1 = ""; let classeJ2 = "";
                            let prefixoJ1 = ""; let prefixoJ2 = "";

                            if (partidaConcluida) {
                                const idVencedor = jogo.vencedor_id;
                                const idAtleta1 = jogo.atleta1_id || jogo.athlete1_id;
                                const idAtleta2 = jogo.atleta2_id || jogo.athlete2_id;

                                let j1Ganhou = false; let j2Ganhou = false;

                                if (idVencedor !== null && idVencedor !== undefined) {
                                    j1Ganhou = (idVencedor == idAtleta1);
                                    j2Ganhou = (idVencedor == idAtleta2);
                                } else {
                                    j1Ganhou = (f1 > f2) || (f1 === f2 && t1 > t2);
                                    j2Ganhou = (f2 > f1) || (f1 === f2 && t2 > t1);
                                }

                                if (j1Ganhou) {
                                    classeJ1 = "vencedor-card"; prefixoJ1 = "👑 ";
                                    classeJ2 = "perdedor-card"; prefixoJ2 = "❌ ";
                                } else if (j2Ganhou) {
                                    classeJ1 = "perdedor-card"; prefixoJ1 = "❌ ";
                                    classeJ2 = "vencedor-card"; prefixoJ2 = "👑 ";
                                }
                            } else {
                                const j1Lider = (f1 > f2) || (f1 === f2 && t1 > t2);
                                const j2Lider = (f2 > f1) || (f1 === f2 && t2 > t1);
                                if (j1Lider) classeJ1 = "lider-mesa";
                                if (j2Lider) classeJ2 = "lider-mesa";
                            }

                            let textoTagMesa = `Mesa ${jogo.mesa}`;
                            const idMesaEspecial = Number(jogo.fase_mesa);

                            if (idMesaEspecial === -2 || jogo.fase_mesa_nome === "Grande Final" || (String(jogo.mesa) === "1" && ehMataMataAtivo)) {
                                textoTagMesa = `<span class="badge-final-ouro">🥇 GRANDE FINAL</span>`;
                            } else if (idMesaEspecial === -3 || jogo.fase_mesa_nome === "Disputa de 3º Lugar" || (String(jogo.mesa) === "2" && ehMataMataAtivo && totalConfrontosAtuais <= 2)) {
                                textoTagMesa = `<span class="badge-final-bronze">🥉 DISPUTA DE 3º LUGAR</span>`;
                            } else if (idMesaEspecial === -4 || jogo.fase_mesa_nome === "Semifinal") {
                                textoTagMesa = `🏆 <span style="color:var(--dourado-brilhante); font-weight:bold;">SEMIFINAL</span>`;
                            } else if (jogo.fase_mesa_nome) {
                                textoTagMesa = `💥 ${jogo.fase_mesa_nome.toUpperCase()}`;
                            } else {
                                textoTagMesa = `⚔️ MESA ${jogo.mesa} - ELIMINATÓRIA`;
                            }

                            card.innerHTML = `
                                <div class="mesa-tag" style="margin-bottom: 12px;">${textoTagMesa}</div>
                                <div class="confronto-flex">
                                    <div class="atleta-box ${classeJ1}">
                                        <span class="atleta-linha">${prefixoJ1}${jogo.atleta1_nome}</span>
                                        <span class="placar-tag">${p1Str}</span>
                                    </div>
                                    ${partidaConcluida ? '<div class="vs-espacador-oculto"></div>' : '<div class="vs-tag">VS</div>'}
                                    <div class="atleta-box ${classeJ2}">
                                        <span class="atleta-linha">${prefixoJ2}${advNome}</span>
                                        <span class="placar-tag">${p2Str}</span>
                                    </div>
                                </div>
                            `;
                            containerJogos.appendChild(card);
                        });

                        ajustarTamanhoDosCards(totalConfrontosAtuais, ehMataMataAtivo);
                    }
                }
            }

            // --- RENDERIZAÇÃO SEGUNDA COLUNA (CLASSIFICATÓRIA APENAS) ---
            if (!ehMataMataAtivo) {
                const rankingCompletoData = data.ranking ? data.ranking : [];
                const signatureAtualRanking = JSON.stringify(rankingCompletoData);

                if (signatureAtualRanking !== ultimoEstadoRankingStr) {
                    ultimoEstadoRankingStr = signatureAtualRanking; 
                    const tableBody = document.getElementById('tabela-ranking-corpo');
                    if (tableBody) {
                        tableBody.innerHTML = '';
                        if (rankingCompletoData.length > 0) {
                            rankingCompletoData.forEach((player, index) => {
                                const row = document.createElement('tr');
                                if (index < 4) row.className = 'top-atleta';
                                row.innerHTML = `
                                    <td class="posicao-num">${index + 1}º</td>
                                    <td style="font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px;">${player.nome}</td>
                                    <td style="text-align: right;"><span class="badge-vitorias">${player.vitorias} V</span></td>
                                `;
                                tableBody.appendChild(row);
                            });
                            setTimeout(gerenciarScrollDoRanking, 100);
                        }
                    }
                }
            }

        } catch (error) {
            console.error("Erro no processamento de dados do telão:", error);
        }
    }

    atualizarTelao();
    setInterval(atualizarTelao, 3000);
</script>
</body>
</html>
