<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telão - Torneio de Truco Cego</title>
    <style>
        /* --- Identidade Visual Corrigida: Verde Nobre & Dourado --- */
        :root {
            --bg-principal: #060c08;      /* Fundo verde escuro profundo estilo casino */
            --bg-card: #0d1811;           /* Fundo dos cards ligeiramente mais claro */
            --verde-truco: #00ff66;       /* O verde vibrante clássico de destaque */
            --borda-ouro: #d4af37;        /* Dourado oficial */
            --dourado-brilhante: #fff7d6; /* Texto dourado destacado */
            --texto-claro: #e0e5e1;       /* Texto padrão com tom esverdeado sutil */
            --texto-mutado: #7aa087;      /* Texto secundário */
            --danger: #ff4757;
            --madeira: #cd7f32;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 25px;
            overflow-x: hidden;
        }

        /* --- Painel Admin flutuante/discreto para não quebrar o topo --- */
        .painel-admin-secreto {
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 15px;
            border-radius: 30px;
            margin-bottom: 25px;
            display: inline-flex;
            gap: 12px;
            border: 1px solid rgba(0, 255, 102, 0.2);
        }
        .btn-admin {
            background: #112217;
            color: var(--verde-truco);
            border: 1px solid var(--verde-truco);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-admin:hover {
            background: var(--verde-truco);
            color: #000;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.4);
        }
        .btn-admin.btn-reset {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(255, 71, 87, 0.05);
        }
        .btn-admin.btn-reset:hover {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.4);
        }

        /* --- Banner de Alerta Absoluto --- */
        .alerta-falta-banner {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 12px solid var(--danger);
            box-sizing: border-box;
            animation: pulseBorda 1.5s infinite alternate;
        }
        .alerta-falta-conteudo h2 {
            color: var(--danger);
            font-size: 4.5rem;
            margin: 10px 0;
            text-shadow: 0 0 25px rgba(255,71,87,0.7);
            font-weight: 900;
        }
        .alerta-falta-conteudo p {
            color: #fff;
            font-size: 2.2rem;
            margin-top: 25px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* --- Cabeçalho Otimizado --- */
        .header-telao {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #122519;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }
        .header-telao h1 {
            margin: 0;
            font-size: 2.8rem;
            letter-spacing: 2px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .header-telao h1 span { 
            color: var(--verde-truco); 
            text-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
        }
        .cronometro-container {
            border: 2px solid var(--borda-ouro);
            padding: 12px 35px;
            border-radius: 12px;
            background: #000;
            box-shadow: 0 0 15px rgba(214, 175, 55, 0.2);
        }
        .cronometro-digital {
            font-size: 3.2rem;
            font-family: monospace;
            font-weight: bold;
            color: var(--borda-ouro);
        }

        /* --- Distribuição dos Painéis Superiores --- */
        .painel-infos {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .info-item {
            background: var(--bg-card);
            padding: 18px;
            border-radius: 10px;
            border: 1px solid #162f20;
            border-left: 4px solid var(--borda-ouro);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .info-rotulo {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--texto-mutado);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .info-valor {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
        }

        /* --- Layout de Distribuição Principal (Melhor aproveitamento) --- */
        .container-telao {
            display: grid;
            grid-template-columns: 2.4fr 1fr;
            gap: 30px;
        }
        .secao-titulo {
            font-size: 1.6rem;
            border-bottom: 2px solid #162f20;
            padding-bottom: 12px;
            margin-top: 0;
            margin-bottom: 25px;
            color: var(--verde-truco);
            font-weight: 700;
        }

        /* --- Grid de Mesas Otimizado (Preenche melhor o espaço) --- */
        .grid-jogos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
        }
        .card-jogo {
            background: var(--bg-card);
            border: 1px solid #1a3826;
            border-radius: 10px;
            padding: 18px;
            position: relative;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            transition: transform 0.2s;
        }
        .card-jogo:hover {
            border-color: var(--verde-truco);
        }
        .mesa-tag {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 12px;
            color: var(--borda-ouro);
            letter-spacing: 0.5px;
        }
        .confronto-flex {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .atleta-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.4);
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .atleta-box.lider-mesa {
            border-left: 4px solid var(--verde-truco);
            background: rgba(0, 255, 102, 0.04);
        }
        .atleta-linha { 
            font-weight: 600; 
            font-size: 1.1rem;
            color: #fff;
        }
        .placar-tag { 
            font-family: monospace; 
            font-weight: bold; 
            font-size: 1.05rem;
            color: var(--verde-truco); 
            background: #000;
            padding: 3px 8px;
            border-radius: 4px;
        }
        .vs-tag { 
            text-align: center; 
            font-size: 0.85rem; 
            color: #2c543a; 
            font-weight: 800; 
            margin: -2px 0;
        }

        /* Badges de Finais */
        .badge-final-ouro { background: var(--borda-ouro); color: #000; padding: 3px 8px; border-radius: 5px; font-weight: bold; }
        .badge-final-bronze { background: var(--madeira); color: #fff; padding: 3px 8px; border-radius: 5px; font-weight: bold; }

        /* --- Ranking Lateral --- */
        .ranking-container {
            background: #09120d;
            padding: 22px;
            border-radius: 10px;
            border: 1px solid #162f20;
            box-shadow: 0 6px 15px rgba(0,0,0,0.5);
        }
        .tabela-ranking {
            width: 100%;
            border-collapse: collapse;
        }
        .tabela-ranking th, .tabela-ranking td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid #142b1d;
        }
        .tabela-ranking th { 
            color: var(--texto-mutado); 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            letter-spacing: 1px;
        }
        .posicao-num { 
            width: 45px; 
            font-weight: bold; 
            color: var(--verde-truco); 
            font-size: 1.1rem;
        }
        .badge-vitorias { 
            background: #000; 
            color: var(--borda-ouro);
            padding: 5px 12px; 
            border-radius: 15px; 
            font-size: 0.9rem; 
            font-weight: bold;
            border: 1px solid var(--borda-ouro); 
        }

        /* --- Pódio / Cerimonial Estilo Premium --- */
        .podio-wrapper {
            background: linear-gradient(180deg, var(--bg-card) 0%, #030604 100%);
            padding: 45px;
            border-radius: 15px;
            border: 2px solid var(--borda-ouro);
            box-shadow: 0 0 30px rgba(214,175,55,0.15);
        }
        .podio-titulo {
            text-align: center;
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--borda-ouro);
            text-shadow: 0 0 20px rgba(214,175,55,0.4);
            margin-bottom: 12px;
        }
        .podio-flex {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 25px;
            margin-top: 50px;
        }
        .podio-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
        }
        .podio-card.ouro { border: 3px solid var(--borda-ouro); height: 300px; width: 310px; order: 2; background: linear-gradient(180deg, #1f1b0a 0%, var(--bg-card) 100%); }
        .podio-card.prata { border: 2px solid #b8b8b8; height: 250px; width: 270px; order: 1; }
        .podio-card.bronze { border: 2px solid var(--madeira); height: 220px; width: 270px; order: 3; }
        .podio-card.quarto-lugar { border: 1px solid #444; height: 190px; width: 250px; order: 4; }
        
        .podio-medalha { font-size: 2.8rem; margin-bottom: 12px; }
        .podio-rotulo-lugar { font-size: 0.95rem; text-transform: uppercase; font-weight: bold; color: var(--texto-mutado); }
        .podio-nome { font-size: 1.4rem; font-weight: bold; margin-top: 15px; color: #fff; word-break: break-word; }

        @media (max-width: 992px) {
            .container-telao { grid-template-columns: 1fr; }
            .painel-infos { grid-template-columns: repeat(2, 1fr); }
            .podio-flex { flex-direction: column; align-items: center; }
            .podio-card { width: 100% !important; max-width: 320px; height: auto !important; order: initial !important; }
        }

        @keyframes pulseBorda {
            from { border-color: var(--danger); box-shadow: inset 0 0 50px rgba(255,71,87,0.5); }
            to { border-color: #b33939; box-shadow: inset 0 0 20px rgba(255,71,87,0.2); }
        }
    </style>
</head>
<body>

    <div class="painel-admin-secreto">
        <button class="btn-admin" onclick="forcarPodioManual()">🏆 Exibir Premiação</button>
        <button class="btn-admin btn-reset" onclick="liberarTelaoManual()">🔄 Voltar para Mesas</button>
    </div>

    <div id="alerta-falta" class="alerta-falta-banner">
        <div class="alerta-falta-conteudo">
            <h2>⚠️ TEMPO ESGOTADO!</h2>
            <h2>AGORA TUDO É FALTA!</h2>
            <p>Concluam a jogada imediatamente.</p>
        </div>
    </div>

    <div class="header-telao">
        <h1 id="nome-torneio">TORNEIO DE TRUCO <span>CEGO</span></h1>
        <div class="cronometro-container">
            <div id="cronometro" class="cronometro-digital">00:00</div>
        </div>
    </div>

    <div class="painel-infos">
        <div class="info-item">
            <div class="info-rotulo">Fase Atual</div>
            <div id="info-fase" class="info-valor">---</div>
        </div>
        <div class="info-item">
            <div class="info-rotulo">Andamento</div>
            <div id="info-detalhe-fase" class="info-valor">---</div>
        </div>
        <div class="info-item">
            <div class="info-rotulo">Configuração</div>
            <div id="info-max-rodadas" class="info-valor">-- Rodadas Max</div>
        </div>
        <div class="info-item">
            <div class="info-rotulo">Inscritos Confirmados</div>
            <div id="info-total-atletas" class="info-valor">-- Atletas</div>
        </div>
    </div>

    <div id="conteudo-principal-telao" class="container-telao">
        <div>
            <h2 class="secao-titulo">Mesas em Andamento</h2>
            <div id="container-jogos" class="grid-jogos"></div>
        </div>

        <div class="ranking-container">
            <h2 class="secao-titulo" style="margin-bottom: 20px;">Top 5 Líderes</h2>
            <table class="tabela-ranking">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Atleta</th>
                        <th style="text-align: right;">Vitórias</th>
                    </tr>
                </thead>
                <tbody id="tabela-ranking-corpo"></tbody>
            </table>
        </div>
    </div>

    <script>
    let podioForcadoManualmente = localStorage.getItem('telao_modo_podio') === 'true';
    let ultimoEstadoJogosStr = "";
    let ultimoEstadoRankingStr = "";

    function forcarPodioManual() {
        podioForcadoManualmente = true;
        localStorage.setItem('telao_modo_podio', 'true');
        atualizarTelao();
    }

    function liberarTelaoManual() {
        podioForcadoManualmente = false;
        localStorage.setItem('telao_modo_podio', 'false');
        window.location.reload();
    }

    async function atualizarTelao() {
        try {
            const response = await fetch(`/api/publico/dados?t=${new Date().getTime()}`);
            if (!response.ok) return;
            const data = await response.json();
            if (!data) return;

            const statusFase = data.fase_torneio ? data.fase_torneio.toUpperCase() : "";
            const nomeFaseStr = data.nome_fase ? data.nome_fase.toUpperCase() : "";
            
            const exibirCerimonial = podioForcadoManualmente || 
                                     statusFase === "ENCERRADO" || 
                                     statusFase === "CONCLUIDO" || 
                                     statusFase === "FINALIZADO" ||
                                     nomeFaseStr.includes("ENCERRADO") || 
                                     nomeFaseStr.includes("CONCLUÍDO") ||
                                     Number(data.fase_atual) === -12;

            if (exibirCerimonial) {
                ultimoEstadoJogosStr = "";
                ultimoEstadoRankingStr = "";

                const telaPrincipal = document.getElementById('conteudo-principal-telao');
                if (telaPrincipal) telaPrincipal.style.gridTemplateColumns = "1fr"; 

                let p1 = "---", p2 = "---", p3 = "---", p4 = "---";
                let reiDasFloresNome = "---";
                let qtdFloresTotal = 0;

                const isMataMataFinal = Number(data.fase_atual) === -1 || nomeFaseStr.includes("FINAL") || statusFase === "FINAL" || statusFase === "MATA_MATA";

                if (isMataMataFinal && data.confrontos && data.confrontos.length > 0) {
                    const jogoFinal = data.confrontos.find(j => Number(j.fase_mesa) === -2 || Number(j.mesa) === 1);
                    if (jogoFinal) {
                        const t1 = Number(jogoFinal.tentos1 || 0);
                        const t2 = Number(jogoFinal.tentos2 || 0);
                        const vId = jogoFinal.vencedor_id;
                        const idA1 = jogoFinal.atleta1_id || jogoFinal.athlete1_id;

                        if (vId || t1 > 0 || t2 > 0) {
                            if (vId == idA1 || t1 > t2) {
                                p1 = jogoFinal.atleta1_nome || "---";
                                p2 = jogoFinal.atleta2_nome || "---";
                            } else {
                                p1 = jogoFinal.atleta2_nome || "---";
                                p2 = jogoFinal.atleta1_nome || "---";
                            }
                        } else {
                            p1 = `${jogoFinal.atleta1_nome} (Finalista)`;
                            p2 = `${jogoFinal.atleta2_nome} (Finalista)`;
                        }
                    }

                    const jogoBronze = data.confrontos.find(j => Number(j.fase_mesa) === -3 || Number(j.mesa) === 2);
                    if (jogoBronze) {
                        const t1 = Number(jogoBronze.tentos1 || 0);
                        const t2 = Number(jogoBronze.tentos2 || 0);
                        const vId = jogoBronze.vencedor_id;
                        const idA1 = jogoBronze.atleta1_id || jogoBronze.athlete1_id;

                        if (vId || t1 > 0 || t2 > 0) {
                            if (vId == idA1 || t1 > t2) {
                                p3 = jogoBronze.atleta1_nome || "---";
                                p4 = jogoBronze.atleta2_nome || "---";
                            } else {
                                p3 = jogoBronze.atleta2_nome || "---";
                                p4 = jogoBronze.atleta1_nome || "---";
                            }
                        } else {
                            p3 = `${jogoBronze.atleta1_nome} (Disputa)`;
                            p4 = `${jogoBronze.atleta2_nome} (Disputa)`;
                        }
                    }
                } 
                
                if (data.podio) {
                    reiDasFloresNome = data.podio.rei_nome || data.podio.rei_flores || "---";
                    qtdFloresTotal = data.podio.max_flores || data.podio.flores || 0;
                    if (p1 === "---") p1 = data.podio.campeao || data.podio.p1 || "---";
                    if (p2 === "---") p2 = data.podio.vice || data.podio.p2 || "---";
                    if (p3 === "---") p3 = data.podio.terceiro || data.podio.p3 || "---";
                    if (p4 === "---") p4 = data.podio.quarto || data.podio.p4 || "---";
                } else if (data.ranking && data.ranking.length > 0 && p1 === "---") {
                    p1 = data.ranking[0]?.nome || "---";
                    p2 = data.ranking[1]?.nome || "---";
                    p3 = data.ranking[2]?.nome || "---";
                    p4 = data.ranking[3]?.nome || "---";
                }

                if (p1 !== "---" && p1 !== "") {
                    localStorage.setItem('cache_nomes_podio', JSON.stringify({p1, p2, p3, p4, reiDasFloresNome, qtdFloresTotal}));
                } else {
                    const cache = JSON.parse(localStorage.getItem('cache_nomes_podio') || '{}');
                    if (cache.p1) {
                        p1 = cache.p1; p2 = cache.p2; p3 = cache.p3; p4 = cache.p4;
                        reiDasFloresNome = cache.reiDasFloresNome || "---";
                        qtdFloresTotal = cache.qtdFloresTotal || 0;
                    }
                }

                if (telaPrincipal) {
                    telaPrincipal.innerHTML = `
                        <div class="podio-wrapper">
                            <div class="podio-titulo">👑 CERIMÔNIA DE PREMIAÇÃO 👑</div>
                            <div style="text-align:center; color:var(--texto-mutados); margin-bottom:45px; font-style:italic; font-size:1.2rem;">O pódio oficial da edição está consolidado nos pergaminhos da arena!</div>
                            
                            <div class="podio-flex">
                                <div class="podio-card prata">
                                    <div>
                                        <div class="podio-medalha">🥈</div>
                                        <div class="podio-rotulo-lugar">Vice-Campeão</div>
                                    </div>
                                    <div class="podio-nome">${p2}</div>
                                </div>

                                <div class="podio-card ouro">
                                    <div>
                                        <div class="podio-medalha">👑</div>
                                        <div class="podio-rotulo-lugar">GRANDE CAMPEÃO</div>
                                    </div>
                                    <div class="podio-nome" style="font-size: 1.6rem; color: var(--dourado-brilhante);">${p1}</div>
                                </div>

                                <div class="podio-card bronze">
                                    <div>
                                        <div class="podio-medalha">🥉</div>
                                        <div class="podio-rotulo-lugar">3º Colocado</div>
                                    </div>
                                    <div class="podio-nome">${p3}</div>
                                </div>

                                <div class="podio-card quarto-lugar" style="background: rgba(20,20,20,0.5); border: 2px solid var(--madeira); height: 190px; border-radius: 12px; padding: 25px; width: 260px; display: flex; flex-direction: column; justify-content: space-between;">
                                    <div>
                                        <div class="podio-medalha" style="font-size: 2rem; margin-top: 5px;">🏅</div>
                                        <div class="podio-rotulo-lugar" style="color: var(--madeira); font-size: 1rem; margin-bottom: 5px;">4º Colocado</div>
                                    </div>
                                    <div class="podio-nome" style="color: #aaa; font-size: 1.1rem;">${p4}</div>
                                </div>
                            </div>

                            <div class="painel-rei-flores" style="border: 2px dashed #8a2be2; background: linear-gradient(135deg, rgba(75,0,130,0.2), rgba(138,43,226,0.05)); padding: 25px; border-radius: 12px; text-align: center; max-width: 650px; margin: 50px auto 0 auto; box-shadow: 0 0 15px rgba(138,43,226,0.15);">
                                <div style="color: #da70d6; font-size: 1.3rem; font-weight: bold; margin-bottom: 6px; letter-spacing: 1px;">🌸 TROFÉU REI DAS FLORES 🌸</div>
                                <div style="color: #aaa; font-size: 0.95rem; margin-bottom: 12px;">O maior cantador de flores de toda a edição é:</div>
                                <div style="color: #ffffff; font-size: 2rem; font-weight: 800; letter-spacing: 1px; margin-bottom: 10px;">${reiDasFloresNome.toUpperCase()}</div>
                                <div style="display: inline-block; background: #8a2be2; color: #fff; padding: 6px 18px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.3);">
                                    🎯 ${qtdFloresTotal} Flores Cantadas no Torneio
                                </div>
                            </div>
                        </div>
                    `;
                }
                
                document.getElementById('info-fase').innerText = "🏁 ENCERRADO";
                document.getElementById('info-detalhe-fase').innerText = "Torneio Concluído";
                document.getElementById('cronometro').innerText = "--:--";
                return;
            }

            // FLUXO NORMAL
            const telaPrincipal = document.getElementById('conteudo-principal-telao');
            if (telaPrincipal && !document.getElementById('container-jogos')) {
                telaPrincipal.style.gridTemplateColumns = "2.4fr 1fr";
                telaPrincipal.innerHTML = `
                    <div>
                        <h2 class="secao-titulo">Mesas em Andamento</h2>
                        <div id="container-jogos" class="grid-jogos"></div>
                    </div>
                    <div class="ranking-container">
                        <h2 class="secao-titulo" style="margin-bottom: 20px;">Top 5 Líderes</h2>
                        <table class="tabela-ranking">
                            <thead><tr><th>Pos</th><th>Atleta</th><th style="text-align: right;">Vitórias</th></tr></thead>
                            <tbody id="tabela-ranking-corpo"></tbody>
                        </table>
                    </div>
                `;
            }

            if (document.getElementById('info-fase')) {
                const faseRaw = Number(data.fase_atual);
                let nomeExibicaoFase = data.nome_fase || data.fase_atual || data.fase || "Fase Classificatória";
                if (faseRaw === -1) nomeExibicaoFase = "Mata-Mata Final";
                if (faseRaw === -4) nomeExibicaoFase = "Semifinal";
                document.getElementById('info-fase').innerText = nomeExibicaoFase;
             }

            if (document.getElementById('info-detalhe-fase')) {
                let andamentoTexto = data.detalhe_fase || data.andamento || data.status_rodada;
                const faseTexto = document.getElementById('info-fase').innerText.toUpperCase();
                if (andamentoTexto && andamentoTexto.toUpperCase() === faseTexto || (andamentoTexto && andamentoTexto.replace(/\D/g,'') === faseTexto.replace(/\D/g,''))) {
                    andamentoTexto = "Em Andamento"; 
                }
                if (!andamentoTexto && (data.rodada_atual || data.rodada)) {
                    andamentoTexto = `Rodada ${data.rodada_atual || data.rodada}`;
                }
                document.getElementById('info-detalhe-fase').innerText = andamentoTexto || "Em andamento";
            }

            const elMax = document.getElementById('info-max-rodadas');
            if (elMax) {
                const maxRodadas = data.max_rodadas || data.total_rodadas || data.limite_rodadas || (data.configuracao ? data.configuracao.max_rodadas : null);
                if (data.fase_torneio === "CLASSIFICATORIA" || !data.fase_torneio || Number(data.fase_atual) >= 0) {
                    elMax.innerText = maxRodadas ? `${maxRodadas} Rodadas Max` : "Configurando...";
                } else {
                    elMax.innerText = "Chaveamento M.M";
                }
            }

            const elAtletas = document.getElementById('info-total-atletas');
            if (elAtletas) {
                const qtdAtletas = data.total_atletas || data.inscritos || data.atletas_confirmados || data.total_jogadores || 0;
                elAtletas.innerText = `${qtdAtletas} Atletas`;
            }
            
            const tempoFormatado = data.tempo || "00:00";
            const cronoAtivo = data.crono_ativo === 1;
            const cronoElement = document.getElementById('cronometro');
            const alertaElement = document.getElementById('alerta-falta');
            
            if (!cronoAtivo) {
                cronoElement.innerText = tempoFormatado;
                cronoElement.style.color = '#555555';
                cronoElement.parentElement.style.borderColor = '#444444';
                cronoElement.parentElement.style.boxShadow = 'none';
                alertaElement.style.display = 'none';
            } else {
                cronoElement.parentElement.style.borderColor = 'var(--borda-ouro)';
                cronoElement.parentElement.style.boxShadow = '0 0 15px rgba(214, 175, 55, 0.3)';
                
                if (tempoFormatado === "AGORA TUDO É FALTA!" || tempoFormatado === "00:00") {
                    cronoElement.innerText = "00:00";
                    cronoElement.style.color = 'var(--danger)';
                    alertaElement.style.display = 'flex';
                } else {
                    cronoElement.innerText = tempoFormatado;
                    cronoElement.style.color = 'var(--borda-ouro)';
                    alertaElement.style.display = 'none';
                }
            }

            // --- RENDERIZAÇÃO DOS CONFRONTOS ---
            const containerJogos = document.getElementById('container-jogos');
            if (containerJogos) {
                const signatureAtualJogos = JSON.stringify(data.confrontos || []);
                
                if (signatureAtualJogos !== ultimoEstadoJogosStr) {
                    ultimoEstadoJogosStr = signatureAtualJogos; 
                    containerJogos.innerHTML = '';
                    
                    if (!data.confrontos || data.confrontos.length === 0) {
                        containerJogos.innerHTML = `<div style="color: var(--texto-mutado); font-style: italic; padding: 10px;">Nenhum confronto ativo. Aguardando rodada...</div>`;
                    } else {
                        data.confrontos.forEach(jogo => {
                            const card = document.createElement('div');
                            card.className = 'card-jogo';
                            const advNome = jogo.atleta2_nome ? jogo.atleta2_nome : "FOLGA - GANHOU PONTOS";
                            
                            const f1 = jogo.sets1 !== null ? jogo.sets1 : (jogo.flores1 || 0);
                            const t1 = jogo.tentos1 || 0;
                            const fa1 = jogo.faltas1 || 0;

                            const f2 = jogo.sets2 !== null ? jogo.sets2 : (jogo.flores2 || 0);
                            const t2 = jogo.tentos2 || 0;
                            const fa2 = jogo.faltas2 || 0;

                            const p1Str = `${f1}S | ${t1}T | ${fa1}F`;
                            const p2Str = `${f2}S | ${t2}T | ${fa2}F`;
                            
                            const j1Lider = (f1 > f2) || (f1 === f2 && t1 > t2);
                            const j2Lider = (f2 > f1) || (f1 === f2 && t2 > t1);

                            let textoTagMesa = `Mesa ${jogo.mesa}`;
                            const idMesaEspecial = Number(jogo.fase_mesa);

                            if (idMesaEspecial === -2 || jogo.fase_mesa_nome === "Grande Final") {
                                textoTagMesa = `<span class="badge-final-ouro">🥇 GRANDE FINAL</span>`;
                            } else if (idMesaEspecial === -3 || jogo.fase_mesa_nome === "Disputa de 3º Lugar") {
                                textoTagMesa = `<span class="badge-final-bronze">🥉 DISPUTA DE 3º LUGAR</span>`;
                            } else if (idMesaEspecial === -4 || jogo.fase_mesa_nome === "Semifinal") {
                                textoTagMesa = `Mesa ${jogo.mesa} — <span style="color:var(--borda-ouro); font-weight:bold;">SEMIFINAL</span>`;
                            } else if (jogo.fase_mesa_nome) {
                                textoTagMesa = `Mesa ${jogo.mesa} — ${jogo.fase_mesa_nome}`;
                            }

                            card.innerHTML = `
                                <div class="mesa-tag">${textoTagMesa}</div>
                                <div class="confronto-flex">
                                    <div class="atleta-box ${j1Lider ? 'lider-mesa' : ''}">
                                        <span class="atleta-linha">${jogo.atleta1_nome}</span>
                                        <span class="placar-tag">${p1Str}</span>
                                    </div>
                                    <div class="vs-tag">VS</div>
                                    <div class="atleta-box ${j2Lider ? 'lider-mesa' : ''}">
                                        <span class="atleta-linha">${advNome}</span>
                                        <span class="placar-tag">${p2Str}</span>
                                    </div>
                                </div>
                            `;
                            containerJogos.appendChild(card);
                        });
                    }
                }
            }

            // --- RENDERIZAÇÃO DO RANKING ---
            const tableBody = document.getElementById('tabela-ranking-corpo');
            if (tableBody) {
                const top5Data = data.ranking ? data.ranking.slice(0, 5) : [];
                const signatureAtualRanking = JSON.stringify(top5Data);

                if (signatureAtualRanking !== ultimoEstadoRankingStr) {
                    ultimoEstadoRankingStr = signatureAtualRanking; 
                    tableBody.innerHTML = '';
                    
                    if (top5Data.length > 0) {
                        top5Data.forEach((player, index) => {
                            const row = document.createElement('tr');
                            row.innerHTML = `
                                <td class="posicao-num">${index + 1}º</td>
                                <td style="font-weight: 600; color: #fff;">${player.nome}</td>
                                <td style="text-align: right;"><span class="badge-vitorias">${player.vitorias} V</span></td>
                            `;
                            tableBody.appendChild(row);
                        });
                    } else {
                        tableBody.innerHTML = `<tr><td colspan="3" style="color: var(--texto-mutado); text-align: center; font-style: italic; padding: 20px 0;">Nenhum atleta listado.</td></tr>`;
                    }
                }
            }

        } catch (error) {
            console.error("Erro no processamento de dados do telão:", error);
        }
    }

    atualizarTelao();
    setInterval(atualizarTelao, 3000);
</script>
</body>
</html>
