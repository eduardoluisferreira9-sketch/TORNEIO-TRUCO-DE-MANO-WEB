<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Torneio de Truco Cego{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* Mantém o fundo verde escuro plano tradicional que você aprovou */
            background-color: #0b4020;
            color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .text-gold {
            color: #d4af37 !important;
            font-weight: bold;
        }
        /* Configuração das Fichas/Cards com fundo escuro sólido e confortável */
        .card-premium {
            background-color: #141916;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.4);
        }
        /* Garante que os inputs fiquem perfeitamente integrados ao tema escuro da ficha */
        .form-control {
            background-color: #212529 !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: #fff !important;
            padding: 10px 12px;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .form-control:focus {
            border-color: #d4af37 !important;
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25) !important;
        }
        /* Botão estilizado em dourado conforme o padrão do torneio */
        .btn-gold {
            background-color: #aa841b;
            border: 1px solid #d4af37;
            color: #fff;
            font-weight: bold;
            padding: 10px 20px;
            transition: background-color 0.2s;
        }
        .btn-gold:hover {
            background-color: #bc9522;
            color: #fff;
        }
        .border-secondary {
            border-color: rgba(255, 255, 255, 0.1) !important;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
