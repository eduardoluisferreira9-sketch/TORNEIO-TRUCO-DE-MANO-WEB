<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Torneio de Truco Cego{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-principal: #0b4020;
            --bg-cards: #141916;
            --ouro: #d4af37;
            --ouro-hover: #bc9522;
            --ouro-btn: #aa841b;
            --input-bg: #212529;
        }

        body {
            background-color: var(--bg-principal);
            color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .text-gold {
            color: var(--ouro) !important;
            font-weight: bold;
        }
        
        /* Configuração das Fichas/Cards com fundo escuro sólido e confortável */
        .card-premium {
            background-color: var(--bg-cards);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.4);
        }
        
        /* Garante que os inputs fiquem perfeitamente integrados ao tema escuro da ficha */
        .form-control {
            background-color: var(--input-bg) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: #fff !important;
            padding: 10px 12px;
        }
        
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .form-control:focus {
            border-color: var(--ouro) !important;
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25) !important;
        }
        
        /* Botão estilizado em dourado conforme o padrão do torneio */
        .btn-gold {
            background-color: var(--ouro-btn);
            border: 1px solid var(--ouro);
            color: #fff;
            font-weight: bold;
            padding: 10px 20px;
            transition: background-color 0.2s, transform 0.1s ease;
        }
        
        .btn-gold:hover {
            background-color: var(--ouro-hover);
            color: #fff;
        }

        .btn-gold:active {
            transform: scale(0.98);
        }
        
        .border-secondary {
            border-color: rgba(255, 255, 255, 0.1) !important;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <main class="container py-5 flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
